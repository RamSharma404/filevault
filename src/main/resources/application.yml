spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/filestorage
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 10GB
      max-request-size: 11GB
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
server:
  port: 8080
  tomcat:
    max-swallow-size: -1
    connection-timeout: 3600000

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
    expiration-ms: 86400000
  google:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:user-files}
  region: ${MINIO_REGION:us-east-1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
