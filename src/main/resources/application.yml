server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/filestorage
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 10GB
      max-request-size: 11GB
server:
  port: 8080
  tomcat:
    max-swallow-size: -1
    connection-timeout: 3600000

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
    expiration-ms: 86400000

minio:
  url: ${MINIO_URL:http://localhost:9000}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:user-files}
  region: ${MINIO_REGION:us-east-1}
