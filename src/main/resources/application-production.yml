spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/filestorage}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

minio:
  url: ${S3_ENDPOINT}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket: ${S3_BUCKET:user-files}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
