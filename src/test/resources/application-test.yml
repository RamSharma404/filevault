spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

app:
  jwt:
    secret: testSecretKeyForJWTTokenGenerationThatIsLongEnoughForHmacSha256
    expiration-ms: 86400000

minio:
  url: http://localhost:9000
  access-key: test
  secret-key: test
  bucket: test-bucket
